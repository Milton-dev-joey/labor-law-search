<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>劳动法规通</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 顶部搜索栏 -->
<header id="header">
  <div class="header-inner">
    <div class="brand" id="brandBtn">劳动法规通</div>
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none">
        <circle cx="8.5" cy="8.5" r="5.75" stroke="currentColor" stroke-width="1.5"/>
        <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" type="text" placeholder="搜索法规关键词，如：经济补偿金、试用期、加班工资…" autocomplete="off" disabled>
      <button id="clearBtn" class="clear-btn" title="清除">&times;</button>
    </div>
    <button id="favToggle" class="fav-toggle" title="我的收藏">
      <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
        <path d="M10 3l2.2 4.5 4.8.7-3.5 3.4.8 4.9L10 14.3 5.7 16.5l.8-4.9L3 8.2l4.8-.7L10 3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <span id="favCount" class="fav-count" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- 主体 -->
<main id="main">

  <!-- 加载数据库 -->
  <div id="dbLoading" class="view">
    <div class="db-load-card">
      <div class="spinner"></div>
      <p id="dbStatus">正在加载数据库…</p>
      <p class="db-hint">首次使用需要选择 laws_dev.db 文件（50MB）</p>
    </div>
  </div>

  <!-- 欢迎页 -->
  <div id="welcome" class="view" style="display:none">
    <div class="welcome-content">
      <h1>劳动法规通</h1>
      <p id="statsLine" class="subtitle">本地劳动法规检索工具</p>
      <div class="hint-tags">
        <button class="hint-tag" data-q="经济补偿金">经济补偿金</button>
        <button class="hint-tag" data-q="试用期">试用期</button>
        <button class="hint-tag" data-q="加班工资">加班工资</button>
        <button class="hint-tag" data-q="年休假">年休假</button>
        <button class="hint-tag" data-q="工伤认定">工伤认定</button>
        <button class="hint-tag" data-q="劳动合同">劳动合同</button>
      </div>
    </div>
  </div>

  <!-- 筛选 + 结果 -->
  <div id="results" class="view" style="display:none">
    <!-- 筛选栏 -->
    <div class="filters-bar" id="filtersBar">
      <!-- 法规类型 -->
      <div class="filter-section">
        <div class="filter-title" data-toggle="typePanel">
          法规类型
          <svg class="filter-arrow" viewBox="0 0 12 12"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        </div>
        <div class="filter-panel" id="typePanel">
          <label class="cb-label"><input type="checkbox" id="typeAll" checked><span>全部</span></label>
          <div id="typeList" class="cb-list"></div>
        </div>
      </div>
      <!-- 地区 -->
      <div class="filter-section">
        <div class="filter-title" data-toggle="regionPanel">
          地区
          <svg class="filter-arrow" viewBox="0 0 12 12"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        </div>
        <div class="filter-panel" id="regionPanel">
          <label class="cb-label"><input type="checkbox" id="regionAll" checked><span>全部</span></label>
          <div id="regionList" class="cb-list"></div>
        </div>
      </div>
      <!-- 时间 -->
      <div class="filter-section">
        <div class="filter-title" data-toggle="datePanel">
          时间范围
          <svg class="filter-arrow" viewBox="0 0 12 12"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        </div>
        <div class="filter-panel" id="datePanel">
          <label class="cb-label"><input type="radio" name="dateRange" value="" checked><span>全部时间</span></label>
          <label class="cb-label"><input type="radio" name="dateRange" value="1y"><span>近一年</span></label>
          <label class="cb-label"><input type="radio" name="dateRange" value="3y"><span>近三年</span></label>
          <label class="cb-label"><input type="radio" name="dateRange" value="5y"><span>近五年</span></label>
          <label class="cb-label"><input type="radio" name="dateRange" value="10y"><span>近十年</span></label>
        </div>
      </div>
      <button id="resetFilters" class="reset-btn">重置筛选</button>
    </div>

    <div id="resultsSummary" class="results-summary"></div>
    <div id="resultsList"></div>
  </div>

  <!-- 收藏页 -->
  <div id="favorites" class="view" style="display:none">
    <div class="fav-header">
      <h2>我的收藏</h2>
      <span id="favSummary" class="fav-summary"></span>
    </div>
    <div id="favList"></div>
    <div id="favEmpty" class="empty-content" style="display:none">
      <p>暂无收藏的法规</p>
      <p class="db-hint">搜索法规后，点击卡片上的星标即可收藏</p>
    </div>
  </div>

  <!-- 空结果 -->
  <div id="empty" class="view" style="display:none">
    <div class="empty-content">
      <p id="emptyText">未找到相关法规</p>
    </div>
  </div>

  <!-- 搜索中 -->
  <div id="loading" class="view" style="display:none">
    <div class="spinner"></div>
    <p>搜索中…</p>
  </div>

</main>

<script src="sql-wasm.js"></script>
<script src="app.js"></script>
</body>
</html>
